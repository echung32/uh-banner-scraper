          example: 'net.hedtech.banner.student.schedule.SectionSessionDecorator'
        courseReferenceNumber:
          type: string
          example: '71843'
        faculty:
          type: array
          items:
            type: object
        meetingTime:
          $ref: '#/components/schemas/MeetingTime'
        term:
          type: string
          example: '202710'
      required:
