    Faculty:
      type: object
      properties:
        bannerId:
          type: string
          description: >-
            Per-session surrogate id, valid only within THIS session. Pass it to
            `/ssb/contactCard/retrieveData` on the same session to open the
            contact card; it is NOT stable across sessions (the same instructor
            gets a different id each session) and a replayed id returns 500.
            `displayName` and `emailAddress` below are the stable, reusable fields.
          example: '10009'
        category:
          type: string
          nullable: true
        class:
          type: string
          example: 'net.hedtech.banner.student.faculty.FacultyResultDecorator'
        courseReferenceNumber:
          type: string
          example: '71843'
        displayName:
          type: string
          example: 'Kyle M. Berney'
        emailAddress:
          type: string
          example: 'berneyk@hawaii.edu'
        primaryIndicator:
          type: boolean
          example: true
        term:
          type: string
          example: '202710'
      required:
        - bannerId
        - displayName
        - emailAddress
        - primaryIndicator

